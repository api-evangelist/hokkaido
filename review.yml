      Hokkaido University exposes a limited, scholarly-infrastructure-only public
      footprint. The HUSCAP institutional repository and its XML sitemap index are
      live and machine-readable. The legacy DSpace OAI-PMH endpoint at
      /dspace-oai/request returns 404 following the repository's December 2025
      platform migration, and no replacement OAI-PMH base URL was publicly
      documented or discoverable at review time; multiple guessed OAI paths on the
      new system all returned 404. No dedicated developer portal or documented
      public REST API was found. The github.com/hokkaido org is unrelated to the
      university and was not cataloged. Only endpoints verified live are asserted;
      no endpoints were fabricated.
